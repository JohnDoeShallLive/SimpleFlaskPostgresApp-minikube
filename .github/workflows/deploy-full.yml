name: CI Pipeline - Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/simpleflaskpostgresapp-minikube:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/simpleflaskpostgresapp-minikube:${{ github.sha }}

      - name: Deployment Status
        run: |
          echo "Docker image built and pushed successfully."
          echo ""
          echo "Latest Image:"
          echo "${{ secrets.DOCKERHUB_USERNAME }}/simpleflaskpostgresapp-minikube:latest"
          echo ""
          echo "Versioned Image:"
          echo "${{ secrets.DOCKERHUB_USERNAME }}/simpleflaskpostgresapp-minikube:${{ github.sha }}"
          echo ""
          echo "Local CD watcher will automatically deploy latest image to Minikube."
