apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
  namespace: flaskapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
        - name: flask-app
          image: shreeee03/simpleflaskpostgresapp-minikube:latest
          ports:
            - containerPort: 5000
          env:
            - name: CONFIG_MODE
              value: "production"
            - name: PRODUCTION_DATABASE_URL
              value: "postgresql+psycopg2://testuser:testpass@postgres-service:5432/testdb"

---
apiVersion: v1
kind: Service
metadata:
  name: flask-service
  namespace: flaskapp
spec:
  type: NodePort
  selector:
    app: flask-app
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30007